  <body>
    <input id="no" type="text" />

    <button id="square">square</button>

    //     console.log(input.value);

    function normalFun() {
      console.log(event);

    normalFun();
    button.addEventListener("click", catchVal);
    function catchVal() {
      console.log(event);

    document.getElementById("square").addEventListener("click", () => {

    });

        let sq = num * num;
        console.log(sq);
      return sq;
    }
